version: "3.8"

services:
  app:
    build: .
    ports:
      - "${APP_PORT:-3001}:${APP_PORT:-3001}"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-sis_db}?schema=public
      - NODE_ENV=${NODE_ENV:-development}
      - APP_PORT=${APP_PORT:-3001}
    command: /bin/sh -c "npx prisma migrate deploy && node dist/src/scripts/seed-tenant.js && node dist/src/main"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sis-network

  db:
    image: postgres:15-alpine
    restart: always
    ports:
      - "${DB_PORT:-5434}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-sis_db}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sis_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sis-network

volumes:
  postgres_data:

networks:
  sis-network:
