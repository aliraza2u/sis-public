version: "3.8"

services:
  app:
    build: .
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    env_file: .env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - APP_PORT=${APP_PORT:-3000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - NON_INTERACTIVE=true
      - APP_SALT_ROUNDS=${APP_SALT_ROUNDS:-12}
      - AUTH_EMAIL_VERIFICATION_EXPIRY=${AUTH_EMAIL_VERIFICATION_EXPIRY:-24}
      - AUTH_PASSWORD_RESET_EXPIRY=${AUTH_PASSWORD_RESET_EXPIRY:-1}
      - AUTH_REFRESH_TOKEN_EXPIRY_DAYS=${AUTH_REFRESH_TOKEN_EXPIRY_DAYS:-7}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_FIRST_NAME=${ADMIN_FIRST_NAME:-Admin}
      - ADMIN_LAST_NAME=${ADMIN_LAST_NAME:-User}
      - DEFAULT_TENANT_SLUG=${DEFAULT_TENANT_SLUG:-al-mkki}
      - DATA_TRANSFER_MAX_FILE_SIZE=${DATA_TRANSFER_MAX_FILE_SIZE:-10485760}
      - DATA_TRANSFER_BATCH_SIZE=${DATA_TRANSFER_BATCH_SIZE:-50}
      - DATA_TRANSFER_TEMP_FILE_MAX_AGE=${DATA_TRANSFER_TEMP_FILE_MAX_AGE:-86400000}
    command: /bin/sh -c "npx prisma migrate deploy && node dist/scripts/seed-languages.js && node dist/main"
    networks:
      - sis-network

networks:
  sis-network:
